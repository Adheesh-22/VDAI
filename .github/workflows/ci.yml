name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create dummy model.onnx
        run: python -c "import onnx; from onnx import helper, TensorProto; input_tensor = helper.make_tensor_value_info('input', TensorProto.FLOAT, [1, 1, 60, None]); output_tensor = helper.make_tensor_value_info('output', TensorProto.FLOAT, [1, 2]); gemm = helper.make_node('GlobalAveragePool', inputs=['input'], outputs=['pooled']); flatten = helper.make_node('Flatten', inputs=['pooled'], outputs=['flat'], axis=1); weight = helper.make_tensor('W', TensorProto.FLOAT, [2, 60], [0.1] * 120); bias = helper.make_tensor('b', TensorProto.FLOAT, [2], [0.0, 0.0]); gemm_node = helper.make_node('Gemm', inputs=['flat', 'W', 'b'], outputs=['output']); graph = helper.make_graph([gemm, flatten, gemm_node], 'dummy', [input_tensor], [output_tensor], initializer=[weight, bias]); model = helper.make_model(graph, opset_imports=[helper.make_opsetid('', 17)]); onnx.save(model, 'model.onnx')"

      - name: Run tests with coverage
        run: pytest test_main.py test_websocket.py --cov=main --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install flake8
        run: pip install flake8>=6.1.0

      - name: Run flake8
        run: flake8 main.py benchmark.py test_main.py test_websocket.py

  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: voiceguard-proto:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create dummy model.onnx for container test
        run: |
          pip install onnx
          python -c "import onnx; from onnx import helper, TensorProto; input_tensor = helper.make_tensor_value_info('input', TensorProto.FLOAT, [1, 1, 60, None]); output_tensor = helper.make_tensor_value_info('output', TensorProto.FLOAT, [1, 2]); gemm = helper.make_node('GlobalAveragePool', inputs=['input'], outputs=['pooled']); flatten = helper.make_node('Flatten', inputs=['pooled'], outputs=['flat'], axis=1); weight = helper.make_tensor('W', TensorProto.FLOAT, [2, 60], [0.1] * 120); bias = helper.make_tensor('b', TensorProto.FLOAT, [2], [0.0, 0.0]); gemm_node = helper.make_node('Gemm', inputs=['flat', 'W', 'b'], outputs=['output']); graph = helper.make_graph([gemm, flatten, gemm_node], 'dummy', [input_tensor], [output_tensor], initializer=[weight, bias]); model = helper.make_model(graph, opset_imports=[helper.make_opsetid('', 17)]); onnx.save(model, 'model.onnx')"

      - name: Start container and run health check
        run: |
          docker run -d --name voiceguard-test -p 8000:8000 -v ${{ github.workspace }}/model.onnx:/app/model.onnx:ro voiceguard-proto:ci
          sleep 5
          curl --fail --retry 5 --retry-delay 2 http://localhost:8000/health
          docker stop voiceguard-test
          docker rm voiceguard-test

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/voiceguard-proto:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/voiceguard-proto:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max